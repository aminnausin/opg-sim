<!doctype html>
<html>
    <head>
        <title>Open Graph Preview Simulator</title>
        <link href="/css/index.css" rel="stylesheet" />
        <link href="/css/output.css" rel="stylesheet" />
    </head>
    <body class="space-y-4 mx-auto p-3">
        <h2 class="text-2xl">Open Graph Preview Simulator</h2>

        <div class="flex flex-col gap-4">
            <input id="url" placeholder="Enter URL..." required class="flex-1 bg-neutral-200 text-neutral-900 focus:bg-white transition-colors duration-200" />

            <div class="gap-y-2 flex flex-col w-full">
                <label class="text-sm"> Agent </label>
                <input
                    id="user-agent"
                    placeholder="Mozilla/5.0 (compatible; Discordbot/2.0; +https://discordapp.com)"
                    class="w-full bg-neutral-200 text-neutral-900 focus:bg-white transition-colors duration-200"
                />
            </div>

            <button onclick="fetchPreview()" class="">Generate Preview</button>

            <div id="card" class="card" style="display: none">
                <img id="img" class="image" />
                <div class="content">
                    <div id="title" class="title"></div>
                    <div id="desc" class="desc"></div>
                    <div id="site" class="site"></div>
                </div>
            </div>
        </div>

        <script>
            async function fetchPreview() {
                try {
                    const url = document.getElementById("url").value;

                    if (!url) {
                        document.getElementById("url").focus();
                        return;
                    }

                    const agent = document.getElementById("user-agent").value;
                    const agentQuery = agent ? `&agent=${encodeURIComponent(agent)}` : "";

                    const res = await fetch("/preview?url=" + encodeURIComponent(url) + agentQuery);
                    const data = await res.json();

                    if (!res.ok) {
                        console.log(res);
                        throw new Error(`Failed: ${res.status} ${res.statusText}`);
                        return;
                    }

                    document.getElementById("card").style.display = "block";

                    document.getElementById("img").src = data.image || "";
                    document.getElementById("title").textContent = data.title || "No title";
                    document.getElementById("desc").textContent = data.description || "";
                    document.getElementById("site").textContent = data.site || "";
                } catch (error) {
                    console.log(error);
                    document.getElementById("card").style.display = "none";
                }
            }
        </script>
    </body>
</html>
